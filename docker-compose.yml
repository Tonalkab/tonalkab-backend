services:
  backend:
    build: ./backend
    container_name: tonalkab_backend
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy # Esto arregla el "prende y apaga"
    networks:
      - tonalkab_net
    ports:
      - "127.0.0.1:8000:8000" # Seguro por defecto para VPS

  db:
    image: mysql:8.0
    container_name: tonalkab_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - tonalkab_net

networks:
  tonalkab_net:
volumes:
  db_data: